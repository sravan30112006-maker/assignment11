<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLNCE Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f0f4f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:white;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    padding:30px;
    text-align:center;
}

.logo{
    width:100px;
    height:100px;
    margin-bottom:10px;
}

h2{
    color:#003366;
    margin-bottom:5px;
}

h4{
    color:#555;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#00509e;
}

a{
    text-decoration:none;
    color:#003366;
    font-size:14px;
}

.footer{
    margin-top:20px;
    font-size:13px;
    color:gray;
}
</style>

</head>
<body>

<div class="container">

    <img src="https://in.images.search.yahoo.com/images/view;_ylt=Awr1SdZmTF9qS3sMdxG9HAx.;_ylu=c2VjA3NyBHNsawNpbWcEb2lkA2Y2ZDA1YmU5MTc1NzE5Njc4NTIyNzI4YzVmOTE4YThjBGdwb3MDMQRpdANiaW5n?back=https%3A%2F%2Fin.images.search.yahoo.com%2Fsearch%2Fimages%3Fp%3Dklnce%2Blogo%26type%3DE210IN714G0%26fr%3Dmcafee%26fr2%3Dpiv-web%26tab%3Dorganic%26ri%3D1&w=840&h=1027&imgurl=www.klnce.edu%2Fmcasfc%2Fimages%2Fresponsive-design.png&rurl=https%3A%2F%2Fwww.klnce.edu%2Fmcasfc%2F&size=199KB&p=klnce+logo&oid=f6d05be9175719678522728c5f918a8c&fr2=piv-web&fr=mcafee&tt=Klnce+Short+Film+Context&b=0&ni=21&no=1&ts=&tab=organic&sigr=iZutlw8ni9BL&sigb=p_ivjxkZWrWi&sigi=S8XcqxDHyT1V&sigt=b3pLf0Oviz07&.crumb=Ffn6o4AVh/A&fr=mcafee&fr2=piv-web&type=E210IN714G0">

    <h2>KLN College of Engineering</h2>
    <h4>Student Login Portal</h4>

    <form action="#">
        <input type="text" placeholder="Register Number / Username" required>

        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <br>

    <a href="#">Forgot Password?</a>

    <div class="footer">
        © 2026 KLN College of Engineering
    </div>

</div>

</body>
</html>
