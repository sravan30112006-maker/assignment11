<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLNCE Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f0f4f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:white;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    padding:30px;
    text-align:center;
}

.logo{
    width:100px;
    height:100px;
    margin-bottom:10px;
}

h2{
    color:#003366;
    margin-bottom:5px;
}

h4{
    color:#555;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#00509e;
}

a{
    text-decoration:none;
    color:#003366;
    font-size:14px;
}

.footer{
    margin-top:20px;
    font-size:13px;
    color:gray;
}
</style>

</head>
<body>

<div class="container">

    <img src="https://imgs.search.brave.com/k2rf894IwkuDwtZKrMyaPmDh3UNmm8n6qBamIvtfhU4/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly93d3cu/c3RhdGljLWNvbnRl/bnRzLnlvdXRoNHdv/cmsuY29tL3VuaXZl/cnNpdHkvRG9jdW1l/bnRzL0NvbGxlZ2Vz/L2NvbGxlZ2VMb2dv/LzI3MzYuanBn">

    <h2>KLN College of Engineering</h2>
    <h4>Student Login Portal</h4>

    <form action="#">
        <input type="text" placeholder="Register Number / Username" required>

        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <br>

    <a href="#">Forgot Password?</a>

    <div class="footer">
        © 2026 KLN College of Engineering
    </div>

</div>

</body>
</html>
