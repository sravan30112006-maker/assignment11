<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLNCE Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#eaf2f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:420px;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
    text-align:center;
}

.logo{
    width:140px;
    height:auto;
    display:block;
    margin:0 auto 15px;
}

h2{
    color:#003366;
    margin-bottom:5px;
}

h4{
    color:#555;
    margin-bottom:20px;
    font-weight:normal;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0059b3;
}

a{
    text-decoration:none;
    color:#003366;
    font-size:14px;
}

.footer{
    margin-top:20px;
    color:gray;
    font-size:13px;
}
</style>

</head>
<body>

<div class="container">

    <img src="https://www.klnce.edu/mcasfc/images/responsive-design.png">

    <h2>KLN College of Engineering</h2>
    <h4>Student Login Portal</h4>

    <form>
        <input type="text" placeholder="Register Number" required>

        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <br>

    <a href="#">Forgot Password?</a>

    <div class="footer">
        © 2026 KLN College of Engineering. All Rights Reserved.
    </div>

</div>

</body>
</html>
